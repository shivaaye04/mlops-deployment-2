apiVersion: apps/v1
kind: Deployment
metadata:
  name: mlops-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mlops-deployment
  template:
    metadata:
      labels:
        app: mlops-deployment
    spec:
      containers:
        - name: mlops-deployment
          image: shivaaye04/mlops-deployment-2:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          readinessProbe:
            httpGet:
              path: /
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5