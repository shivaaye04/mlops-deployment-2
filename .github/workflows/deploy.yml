name: MLOps K3s CI/CD Deployment

on:
  push:
    branches:
      - main

jobs:
  continuous-integration:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: shivaaye04/mlops-deployment-2:latest

  continuous-deployment:
    needs: continuous-integration
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to K3s on AWS EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.AWS_EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.AWS_SSH_KEY }}
          script: |
            mkdir -p ~/k8s-manifests
            cd ~/k8s-manifests

            cat << 'EOF' > deployment.yaml
            apiVersion: apps/v1
            kind: Deployment
            metadata:
              name: mlops-fastapi-deployment
              labels:
                app: mlops-api
            spec:
              replicas: 2
              selector:
                matchLabels:
                  app: mlops-api
              template:
                metadata:
                  labels:
                    app: mlops-api
                spec:
                  containers:
                  - name: mlops-container
                    image: shivaaye04/mlops-deployment-2:latest
                    ports:
                    - containerPort: 8000
                    env:
                    - name: MLFLOW_TRACKING_URI
                      value: "${{ secrets.MLFLOW_TRACKING_URI }}"
            EOF

            cat << 'EOF' > service.yaml
            apiVersion: v1
            kind: Service
            metadata:
              name: mlops-fastapi-service
            spec:
              type: NodePort
              selector:
                app: mlops-api
              ports:
                - port: 8000
                  targetPort: 8000
                  nodePort: 30080
            EOF

            # K3s me sudo lag sakta hai, isliye safe side ke liye sudo ke sath apply kar rahe hain
            sudo kubectl apply -f deployment.yaml
            sudo kubectl apply -f service.yaml
            sudo kubectl rollout restart deployment/mlops-fastapi-deployment